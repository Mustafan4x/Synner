<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synner — Dashboard</title>

  <!-- Fonts: DM Serif Display + DM Sans + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

  <div class="layout">
    <!-- ===== Sidebar ===== -->
    <aside class="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar__logo" aria-label="Synner logo"></div>

      <nav class="sidebar__nav">
        <!-- Dashboard -->
        <a href="/" class="sidebar__btn {% if active_page == 'dashboard' %}active{% endif %}" aria-label="Dashboard" title="Dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 9.75L12 3l9 6.75V21a1.5 1.5 0 01-1.5 1.5h-4.25a.75.75 0 01-.75-.75v-4.5a1.5 1.5 0 00-1.5-1.5h-2a1.5 1.5 0 00-1.5 1.5v4.5a.75.75 0 01-.75.75H5.5A1.5 1.5 0 014 21V9.75z"/>
          </svg>
        </a>

        <!-- History -->
        <a href="/history" class="sidebar__btn {% if active_page == 'history' %}active{% endif %}" aria-label="History" title="History">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M12.75 3.64c.168.026.335.053.502.082M12.75 3.64A48.5 48.5 0 0112 3.5a48.5 48.5 0 00-.75.14M12.75 3.64l.258.04M3.75 16.5V6.108c0-1.135.845-2.098 1.976-2.192A48.4 48.4 0 016.849 3.84"/>
          </svg>
        </a>

        <!-- Controls -->
        <a href="/controls" class="sidebar__btn {% if active_page == 'controls' %}active{% endif %}" aria-label="Controls" title="Controls">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z"/>
          </svg>
        </a>
      </nav>

      <div class="sidebar__bottom">
        <!-- Settings -->
        <a href="/settings" class="sidebar__btn {% if active_page == 'settings' %}active{% endif %}" aria-label="Settings" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </a>
      </div>
    </aside>

    <!-- ===== Main Content ===== -->
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Shared session timer that persists across page navigation -->
  <script>
  (function() {
    'use strict';

    // --- Shared session timer using localStorage ---
    var TIMER_KEY = 'synner_session_start';

    function formatElapsed(ms) {
      var secs = Math.floor(ms / 1000);
      var h = String(Math.floor(secs / 3600)).padStart(2, '0');
      var m = String(Math.floor((secs % 3600) / 60)).padStart(2, '0');
      var s = String(secs % 60).padStart(2, '0');
      return h + ':' + m + ':' + s;
    }

    function updateAllTimerElements() {
      var startStr = localStorage.getItem(TIMER_KEY);
      var elapsedEls = document.querySelectorAll('[data-session-timer]');
      if (!startStr || !elapsedEls.length) return;

      var startTime = parseFloat(startStr);
      var elapsed = formatElapsed(Date.now() - startTime);
      elapsedEls.forEach(function(el) { el.textContent = elapsed; });
    }

    // Poll server for session status on every page load
    fetch('/api/status')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.running && data.start_time) {
          // Server has a running session — store its start time
          // Convert server epoch (seconds) to JS epoch (milliseconds)
          var serverStart = data.start_time * 1000;
          var stored = localStorage.getItem(TIMER_KEY);
          if (!stored) {
            localStorage.setItem(TIMER_KEY, String(serverStart));
          }
          // Start ticking
          updateAllTimerElements();
          setInterval(updateAllTimerElements, 1000);

          // Update status badges on page
          var badges = document.querySelectorAll('[data-session-badge]');
          badges.forEach(function(b) {
            b.className = 'status-badge status-badge--running';
            var dot = b.querySelector('.status-dot');
            var text = b.querySelector('[data-session-status-text]');
            if (text) text.textContent = 'Running';
          });
          // Show timer elements
          document.querySelectorAll('[data-session-timer]').forEach(function(el) {
            el.style.display = '';
          });
        } else {
          // Not running — clear stored timer
          localStorage.removeItem(TIMER_KEY);
          document.querySelectorAll('[data-session-timer]').forEach(function(el) {
            el.style.display = 'none';
          });
        }
      })
      .catch(function() {});

    // Expose helpers for controls page
    window.SynnerTimer = {
      start: function(serverEpochMs) {
        localStorage.setItem(TIMER_KEY, String(serverEpochMs));
        updateAllTimerElements();
        setInterval(updateAllTimerElements, 1000);
      },
      stop: function() {
        localStorage.removeItem(TIMER_KEY);
        document.querySelectorAll('[data-session-timer]').forEach(function(el) {
          el.textContent = '00:00:00';
          el.style.display = 'none';
        });
      },
      formatElapsed: formatElapsed,
    };
  })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
